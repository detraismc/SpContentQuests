# ============================================================================
# CATEGORY: Introduction (EXAMPLE CATEGORY)
# This is an example category file. You can:
#   - Edit this file to customize the category
#   - Create new .yml files in this folder for more categories
#   - Delete this file if you don't want this category
# Each .yml file in this folder becomes its own category.
# Categories group related quests together in their own GUI.
# ============================================================================

# The display name shown at the top of the GUI
# Supports Minecraft color codes (&) and hex colors (<#HEX>)
gui-name: '&nQuests&8 -> Introduction'

# Number of rows in the GUI inventory (1-6)
gui-rows: 6

# ---------------------------------------------------------------
# SOUND SETTINGS
# Each sound plays when a specific GUI action occurs
# Sound IDs are Minecraft namespaced sound identifiers
# ---------------------------------------------------------------
sound:
  click:
    id: ITEM_BOOK_PAGE_TURN
    pitch: 1.0
    volume: 1.0
  complete:
    id: ENTITY_PLAYER_LEVELUP
    pitch: 1.0
    volume: 1.0
  claim: 
    id: BLOCK_NOTE_BLOCK_PLING
    pitch: 1.0
    volume: 1.0
  no: 
    id: ENTITY_VILLAGER_NO
    pitch: 1.0
    volume: 1.0

# ---------------------------------------------------------------
# COMPLETION MESSAGES
# Chat message sent when a quest in this category is completed
# {quest} is replaced with the quest's display name
# ---------------------------------------------------------------
message-complete:
  enable: true
  message: '&aQuest Completed: &e{quest}'

# ---------------------------------------------------------------
# COMPLETION TITLES
# Title/subtitle shown on screen when a quest in this category is completed
# %quest% is replaced with the quest ID
# fadein/stay: duration in ticks (20 ticks = 1 second)
# ---------------------------------------------------------------
title-complete:
  enable: true
  title: '%quest%'
  subtitle: '&fQuest Completed!'
  fadein: 10
  stay: 40

# ---------------------------------------------------------------
# QUEST LAYOUT SETTINGS
# Controls how quests are positioned in the GUI
# ---------------------------------------------------------------

# If true, quests are automatically placed into available slots
# defined in quests-slots, in the order they appear in the quest file.
# If false, you must specify slot and page for each quest individually,
# and quests-slots is ignored.
quests-automatic-layout: false

# The list of GUI slots available for automatic quest placement.
# Slot indices go from 0 (top-left) to 53 (bottom-right) in a 6-row GUI.
# Only used when quests-automatic-layout is true.
quests-slots: [2, 3, 4, 5, 6, 7, 8, 11, 12, 13, 14, 15, 16, 17, 20, 21, 22, 23, 24, 25, 26, 29, 30, 31, 32, 33, 34, 35, 38, 39, 40, 41, 42, 43, 44]

# ---------------------------------------------------------------
# PAGE NAVIGATION ITEMS
# Items used to navigate between pages in the GUI
# ---------------------------------------------------------------
item-page:
  next:
    slot: 51
    item: ARROW
    skullvalue: ''
    modeldata: 0
    amount: 1
    name: '&aNext Page'
    lore:
      - ''
      - '&f➥ Click'
  prev:
    slot: 49
    item: ARROW
    skullvalue: ''
    modeldata: 0
    amount: 1
    name: '&aPrevious Page'
    lore:
      - ''
      - '&f➥ Click'

# ---------------------------------------------------------------
# QUEST ITEM DISPLAY
# Defines how quests look in the GUI at each progress stage.
# Placeholders:
#   <display>       - The quest's display name
#   <desc>          - The quest's description/lore
#   <objective-value>     - Player's current progress
#   <objective-max-value> - requirements progress to complete
#   <reward>        - The reward-display text
#   <requirements-quests>     - Quests that must be completed first
# ---------------------------------------------------------------
quests-item:
  # Quest that is in progress (not yet completed)
  ongoing:
    name: '&f<display>'
    lore:
      - ''
      - '<desc>'
      - ''
      - '&6Objective:'
      - '<objective>'
      - ''
      - '&6Reward:'
      - '<reward>'
      - ''
      - '&e➥ Click to show objective'
  # Quest that is completed but reward not yet claimed
  complete:
    # If item is specified here, it overrides the quest's icon item
    item: CHEST_MINECART
    skullvalue: ''
    modeldata: 0
    amount: 1
    name: '&f<display>'
    lore:
      - ''
      - '<desc>'
      - ''
      - '&6Objective:'
      - '<objective>'
      - ''
      - '&6Reward:'
      - '<reward>'
      - ''
      - '&f➥ Click to Claim'
  # Quest that has been completed and claimed
  claimed:
    item: MINECART
    skullvalue: ''
    modeldata: 0
    amount: 1
    name: '&f<display>'
    lore:
      - ''
      - '<desc>'
      - ''
      - '&6Objective:'
      - '<objective>'
      - ''
      - '&6Reward:'
      - '<reward>'
      - ''
      - '&b&lCOMPLETED'
  # Quest that is locked (prerequisite quests not completed)
  locked:
    item: BARRIER
    skullvalue: ''
    modeldata: 0
    amount: 1
    name: '&f<display>'
    lore:
      - ''
      - '<desc>'
      - ''
      - '&6Objective:'
      - '<objective>'
      - ''
      - '&6Reward:'
      - '<reward>'
      - ''
      - '<requirements>'
      - ''
      - '&4&lLOCKED'
      
  # Format for objective display in the quest lore.
  objective-ongoing: '&8- &f<objective-display> &7(<objective-value>/<objective-max-value>) &4❌'
  objective-complete: '&8- &f<objective-display> &7(<objective-value>/<objective-max-value>) &2✔'

# ---------------------------------------------------------------
# CUSTOM ITEMS
# Decorative or functional items placed at specific slots in the GUI.
# These are NOT quests — they're static items used for decoration,
# navigation between categories, or running commands on click.
#
# Commands support these prefixes:
#   [console] <command>   - Runs command as console
#   [player] <command>    - Runs command as the player
#   [close]               - Closes the GUI
#   %player%              - Replaced with the player's name
# ---------------------------------------------------------------
item-custom:
  pane1:
    slots: [1, 10, 19, 28, 37, 46]
    item: BLACK_STAINED_GLASS_PANE
    enchanted: false
    skullvalue: ''
    modeldata: 0
    amount: 1
    name: ' '
    lore:
      - ''
    commands: []
  pane2:
    slots: [18, 27, 36, 45, 47, 48, 49, 50, 51, 52, 53]
    item: GRAY_STAINED_GLASS_PANE
    enchanted: false
    skullvalue: ''
    modeldata: 0
    amount: 1
    name: ' '
    lore:
      - ''
    commands: []

  # Navigation button: opens this category's own GUI (from the main menu)
  introduction:
    slot: 0
    item: BOOK
    enchanted: true
    skullvalue: ''
    modeldata: 0
    amount: 1
    name: '<#58D057>Introduction'
    lore:
      - '&7Introduction Quests'
      - '&7to get you started.'
      - ''
      - '&f➥ Click'
    commands: []

  # Navigation button: opens the Overworld category GUI
  # The command below runs "spcontentquests open overworld <player>" as console
  overworld:
    slot: 9
    item: GRASS_BLOCK
    enchanted: false
    skullvalue: ''
    modeldata: 0
    amount: 1
    name: '<#89E7CC>Overworld'
    lore:
      - '&7Overworld Quests'
      - '&7for your adventures.'
      - ''
      - '&f➥ Click'
    commands:
      - '[console] spcontentquests open overworld %player%'
