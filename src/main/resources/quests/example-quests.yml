VOTE_OUR_SERVER:
  category: introduction
  icon:
    item: DIAMOND
    model: 0
    skullvalue: ''
    display: '&bVote our Server'
    desc:
      - '&7Vote to the server 1 times.'
      - '&7Use &f/vote &7to get vote link.'
  objective:
    # you need to add the command in your voting plugin: /ftbquests objective add VOTE_OUR_SERVER [player] 1
    type: none
    amount: 1
  # this is for when the quest is left clicked, often to guide player where to go like recipe or warp.
  objective-command:
    - '[player] vote'
    - '[close]'
  reward-display:
    - '&f1x Diamond'
  reward-command:
    - '[console] give %player% diamond 1'

