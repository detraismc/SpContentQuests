VOTE_OUR_SERVER:
  category: introduction
  slot: 23
  page: 1
  icon:
    item: DIAMOND
    amount: 1
    model: 0
    skullvalue: ''
    display: '&bVote our Server'
    desc:
      - '&7Vote to the server 1 times.'
      - '&7Use &f/vote &7to get vote link.'
  objective:
    # you need to add the command in your voting plugin: /ftbquests objective add VOTE_OUR_SERVER [player] 1
    type: none
    amount: 1
  # this is for when the quest is left clicked, often to guide player where to go like recipe or warp.
  objective-command:
    - '[player] vote'
    - '[close]'
  reward-display:
    - '&f1x Diamond'
  reward-command:
    - '[console] give %player% diamond 1'

BE_A_BAKER:
  category: overworld
  icon:
    item: BREAD
    amount: 10
    model: 0
    skullvalue: ''
    display: '&6Be a Baker'
    desc:
      - '&7Craft 10 breads.'
  objective:
    # Type List:
    # -> BREAK_BLOCK
    # -> PLACE_BLOCK
    # -> CRAFT (vanilla items only, skips items with lore/name/enchants)
    # -> CRAFT_CUSTOM (custom items with lore/name/enchants, matched by display name)
    # -> PICKUP_ITEM
    # -> CONSUME
    # -> SMELT
    # -> ENCHANT
    # -> FISHING
    # -> THROW
    # -> KILL
    # -> BREED
    # -> TAME
    # -> SHEAR
    # -> MYTHICMOBS_KILL (requires MythicMobs)
    # -> MMOITEMS_STATIONS_TRADE (requires MMOItems, required format: TYPE|ID)
    # -> MMOITEMS_CONSUME
    # -> MMOITEMS_APPLY_GEMSTONE
    # -> MMOITEMS_APPLY_UPGRADE
    # -> MMOITEMS_APPLY_SOULBOUND
    # -> MMOITEMS_APPLY_REPAIR
    # -> MMOITEMS_UNSOCKET_GEMSTONE
    # -> SLIMEFUN_MULTIBLOCK_{ID} (requires Slimefun, e.g. SLIMEFUN_MULTIBLOCK_ENHANCED_CRAFTING_TABLE)
    # -> SLIMEFUN_ANCIENT_ALTAR (requires Slimefun)
    # -> ITEMSADDER_BREAK_BLOCK (requires ItemsAdder, matched by namespaced ID e.g. myitems:ruby_ore)
    # -> ITEMSADDER_PLACE_BLOCK (requires ItemsAdder, matched by namespaced ID e.g. myitems:ruby_ore)
    type: CRAFT
    amount: 10
    required:
      - BREAD
  objective-command:
    - '[console] recipe bread %player%'
  reward-display:
    - '&f3x Iron Ingot'
  reward-command:
    - '[console] give %player% iron_ingot 3'
    

LEGENDARY_SWORD:
  category: overworld
  icon:
    item: GOLDEN_SWORD
    amount: 1
    model: 0
    skullvalue: ''
    display: '&cLegendary Sword'
    desc:
      - '&7Craft 1 Excalibur.'
  objective:
    type: CRAFT_CUSTOM
    amount: 1
    required:
      # use the color-stripped display name of an output item craft as the identifier for CRAFT_CUSTOM type
      - Excalibur
  objective-command:
    - '[console] recipe bread %player%'
  reward-display:
    - '&f3x Iron Ingot'
  reward-command:
    - '[console] give %player% gold_ingot 3'


BECOME_A_SAMURAI:
  category: overworld
  icon:
    item: PINK_WOOL
    amount: 1
    model: 0
    skullvalue: ''
    display: '&6Become a Samurai'
    desc:
      - '&7Craft 2 Katanas.'
  objective:
    type: CRAFT_CUSTOM
    amount: 2
    required:
      # this use CONTAINS match type, which checks if the display name contains the specified string.
      # This is useful for items with variable parts in their names, like "Katana of Fire", "Frost Katana", etc.
      - CONTAINS:Katana
  objective-command:
    - '[console] recipe bread %player%'
  reward-display:
    - '&f5x Pink Wool'
  reward-command:
    - '[console] give %player% pink_wool 5'



